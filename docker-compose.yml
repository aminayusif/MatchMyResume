version: "3.9"

services:

  backend:
    build: ./backend
    container_name: resume_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./machine-learning:/app/machine-learning
    restart: always

  frontend:
    build: ./frontend
    container_name: resume_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    stdin_open: true